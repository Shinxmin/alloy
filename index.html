<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#17191D" />
    <title>Vaulty</title>
    <style>
      /* 웹사이트 내 모든 스크롤바를 시각적으로 숨김(스크롤 동작 자체는 유지) */
      * {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      *::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }

      /* 새로운 디자인(그리드) 뷰에서 두 블록이 인접해 "결합"될 때 이음새를 따라 한 번 반짝이는
         합금(alloy) 용접 이펙트 애니메이션 */
      @keyframes alloyFuse {
        0% {
          opacity: 0;
          transform: scaleY(0.2);
        }
        35% {
          opacity: 1;
          transform: scaleY(1);
        }
        100% {
          opacity: 0;
          transform: scaleY(1);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
