<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#17191D" />
    <title>αlloy</title>
    <style>
      /* 웹사이트 내 모든 스크롤바를 시각적으로 숨김(스크롤 동작 자체는 유지) */
      * {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      *::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }

      /* 스트레스 테스트 지수 선택 버튼에 쓰는 펄스 애니메이션(시선을 끌기 위한 은은한 테두리 확산 효과) */
      @keyframes stressPulse {
        0%, 100% {
          box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.45);
        }
        50% {
          box-shadow: 0 0 0 6px rgba(255, 107, 107, 0);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
